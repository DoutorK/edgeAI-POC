<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PoC EdgeAI Jurídico</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>PoC Edge + Cloud para Documentos Jurídicos</h1>
      <p>Integração visual: envie PDF/imagem e processe diretamente.</p>

      <label for="docFile">Fluxo direto (PDF/imagem):</label>
      <input id="docFile" type="file" accept=".pdf,image/*" />
      <div class="actions">
        <button id="processDocBtn">Processar documento completo</button>
        <button id="clearCacheBtn" class="button-muted" type="button">Limpar cache (teste)</button>
        <span id="status"></span>
      </div>

      <section>
        <h2>Resumo jurídico</h2>
        <p id="summaryOutput">-</p>
      </section>

      <section>
        <h2>Possíveis riscos</h2>
        <ul id="risksOutput"></ul>
      </section>

      <section>
        <h2>Explicação simplificada</h2>
        <p id="simpleOutput">-</p>
      </section>

      <section>
        <h2>JSON retornado</h2>
        <pre id="output">{}</pre>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
